* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a1a3a; color: #fff; font-family: 'Microsoft YaHei', sans-serif; overflow-x: hidden; }
.header { text-align: center; padding: 18px 0 8px; background: linear-gradient(180deg, #0d2550 0%, transparent 100%); }
.header h1 { font-size: 28px; letter-spacing: 6px; text-shadow: 0 0 20px rgba(33,150,243,0.5); }
.header .sub { font-size: 13px; color: #64b5f6; margin-top: 4px; }
.cards { display: flex; justify-content: center; gap: 24px; padding: 16px 32px; flex-wrap: wrap; }
.card { background: linear-gradient(135deg, #0d2550, #1a3a6a); border: 1px solid #1e5a8a; border-radius: 10px;
        padding: 16px 28px; text-align: center; min-width: 150px; }
.card .value { font-size: 32px; font-weight: bold; color: #64b5f6; }
.card .label { font-size: 12px; color: #90caf9; margin-top: 4px; }
.disclaimer { text-align: center; color: #546e7a; font-size: 11px; padding: 0 32px 8px; }
/* Filters */
.filters { display: flex; justify-content: center; gap: 12px; padding: 8px 24px 12px; flex-wrap: wrap; align-items: center; }
.filters label { color: #90caf9; font-size: 13px; }
.filters input, .filters select {
  background: #0d2550; border: 1px solid #1e5a8a; color: #fff; border-radius: 6px;
  padding: 6px 12px; font-size: 13px; outline: none; font-family: inherit;
}
.filters input:focus, .filters select:focus { border-color: #42A5F5; }
.filters input { width: 160px; }
.filters select { min-width: 120px; }
.filters .filter-group { display: flex; align-items: center; gap: 6px; }
.map-section { padding: 0 24px 16px; }
.map-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.chart-box { background: linear-gradient(135deg, #0d2550, #0f2040); border: 1px solid #1e3a5a;
             border-radius: 10px; padding: 16px; }
.chart-box h3 { font-size: 14px; color: #90caf9; margin-bottom: 8px; border-left: 3px solid #2196F3;
                padding-left: 10px; }
.chart { width: 100%; height: 420px; }
.map-chart { width: 100%; height: 520px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px 24px; }
.footer { text-align: center; padding: 12px; color: #546e7a; font-size: 12px; }
.detail-panel { padding: 0; overflow-y: auto; max-height: 520px; }
.detail-panel .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a3a5a; font-size: 13px; }
.detail-panel .metric .k { color: #90caf9; }
.detail-panel .metric .v { color: #fff; font-weight: bold; }
.detail-panel .city-title { font-size: 18px; font-weight: bold; color: #64b5f6; margin-bottom: 12px; text-align: center; }
.detail-panel .hint { color: #546e7a; text-align: center; padding: 80px 0; font-size: 14px; }
/* Fallback city list */
.fallback-list { max-height: 480px; overflow-y: auto; }
.fallback-list table { width: 100%; border-collapse: collapse; font-size: 12px; }
.fallback-list th { color: #90caf9; text-align: left; padding: 6px 8px; border-bottom: 1px solid #1e5a8a; position: sticky; top: 0; background: #0d2550; }
.fallback-list td { padding: 5px 8px; border-bottom: 1px solid #0f2040; }
/* Mobile */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .map-row { grid-template-columns: 1fr; }
  .cards { gap: 12px; padding: 12px 16px; }
  .card { padding: 12px 16px; min-width: 100px; }
  .card .value { font-size: 22px; }
}
@media (max-width: 600px) {
  .header h1 { font-size: 20px; letter-spacing: 3px; }
  .header .sub { font-size: 11px; }
  .cards { gap: 8px; padding: 8px 12px; }
  .card { padding: 10px 12px; min-width: 80px; }
  .card .value { font-size: 18px; }
  .card .label { font-size: 10px; }
  .filters { gap: 8px; padding: 6px 12px; }
  .filters input { width: 120px; }
  .chart { height: 320px; }
  .map-chart { height: 360px; }
  .detail-panel { max-height: 360px; }
  .map-section, .grid { padding-left: 12px; padding-right: 12px; }
}
</style>

<body>
<div class="header">
  <h1>全国城市地铁客流数据大屏</h1>
  <div class="sub">数据来源：MetroDB.org | 更新日期：<span id="updateDate"></span></div>
</div>
<div class="cards" id="cards"></div>
<div class="disclaimer" id="disclaimer"></div>

<!-- Filters -->
<div class="filters">
  <div class="filter-group">
    <label>搜索城市</label>
    <input type="text" id="citySearch" placeholder="输入城市名...">
  </div>
  <div class="filter-group">
    <label>主指标</label>
    <select id="metricSelect">

      <option value="operating_mileage_km">运营里程</option>
      <option value="operating_stations">运营站点</option>
      <option value="ridership_intensity">客流强度</option>
    </select>
  </div>
  <div class="filter-group">
    <label>排行</label>
    <select id="topNSelect">
      <option value="10">Top 10</option>
      <option value="20">Top 20</option>
      <option value="0">全部</option>
    </select>
  </div>
</div>

<!-- 地图模块 -->
<div class="map-section">
  <div class="map-row">
    <div class="chart-box">
      <h3 id="mapTitle">全国城市地铁散点地图</h3>
      <div class="map-chart" id="chartMap"></div>
    </div>
    <div class="chart-box detail-panel" id="detailPanel">
      <h3>城市详情</h3>
      <div id="detailContent"><div class="hint">点击地图上的城市查看详细指标</div></div>
    </div>
  </div>
</div>

<div class="grid">
  <div class="chart-box"><h3 id="rankTitle">日客流量排行榜（万人次）</h3><div class="chart" id="chartRank"></div></div>
  <div class="chart-box"><h3>运营里程排行榜（km）</h3><div class="chart" id="chartMileage"></div></div>
  <div class="chart-box"><h3 id="trendTitle">Top 8 城市年度客流趋势</h3><div class="chart" id="chartTrend"></div></div>
  <div class="chart-box"><h3>客流强度对比</h3><div class="chart" id="chartIntensity"></div></div>
</div>
<div class="footer">MetroDB 数据可视化 | 共 <span id="cityCount">0</span> 个城市</div>

const hasValidDailyRidership = d => d.daily_ridership_wan > 0;
const fmtDaily = d => hasValidDailyRidership(d) ? d.daily_ridership_wan.toFixed(1) + " 万" : "暂无数据";
const fmtDailyValue = d => hasValidDailyRidership(d) ? d.daily_ridership_wan : null;
const getMetricValue = (d, metric) => {
  if (metric === "daily_ridership_wan") return hasValidDailyRidership(d) ? d.daily_ridership_wan : null;
  return d[metric] || 0;
};
const isMetricValid = (d, metric) => {
  if (metric === "daily_ridership_wan") return hasValidDailyRidership(d);
  if (metric === "ridership_intensity") return d.ridership_intensity > 0;
  return d.operating_stations > 0;
};
const formatMetricValue = (d, metric) => {
  const meta = METRIC_LABELS[metric];
  const value = getMetricValue(d, metric);
  if (value == null) return "暂无数据";
  return Number(value).toFixed(meta.decimals) + (meta.unit ? " " + meta.unit : "");
};
const METRIC_LABELS = {
  daily_ridership_wan: { name: "日客流量", unit: "万人次", decimals: 1 },
  operating_mileage_km: { name: "运营里程", unit: "km", decimals: 0 },
  operating_stations: { name: "运营站点", unit: "座", decimals: 0 },

};

// === 数据过滤 ===
function getFilteredData() {
  let base = validData;
  if (state.keyword) {
    const kw = state.keyword.toLowerCase();
    base = base.filter(d => d.city_cn.includes(kw) || d.city.toLowerCase().includes(kw));
  }
  return base;
}

// === 指标卡片更新 ===
function updateCards() {
  const data = getFilteredData();
  const withDaily = data.filter(hasValidDailyRidership);
  const totalCities = data.length;
  const totalLines = data.reduce((s, d) => s + d.operating_lines, 0);
  const totalStations = data.reduce((s, d) => s + d.operating_stations, 0);
  const totalMileage = data.reduce((s, d) => s + d.operating_mileage_km, 0).toFixed(0);
  const totalDaily = withDaily.reduce((s, d) => s + d.daily_ridership_wan, 0).toFixed(0);

  const cardDefs = [
    { label: "覆盖城市", value: totalCities, unit: "座" },
    { label: "运营线路", value: totalLines, unit: "条" },
    { label: "运营站点", value: totalStations, unit: "座" },
    { label: "总里程", value: totalMileage, unit: "km" },
    { label: "日总客流", value: totalDaily, unit: "万" },
  ];
  document.getElementById("cards").innerHTML = cardDefs.map(c =>
    `<div class="card"><div class="value">${c.value}</div><div class="label">${c.label}（${c.unit}）</div></div>`
  ).join("");

  const noData = validData.filter(d => !hasValidDailyRidership(d)).length;
  document.getElementById("disclaimer").textContent = noData > 0
    ? `日客流统计已排除 ${noData} 个暂无数据城市` : "";
}

// === 排行榜图表更新 ===
function updateRankChart() {
  const ml = METRIC_LABELS[state.metric];
  document.getElementById("rankTitle").textContent = ml.name + "排行榜（" + ml.unit + "）";
  const data = getFilteredData()
    .filter(d => isMetricValid(d, state.metric))
    .sort((a, b) => getMetricValue(b, state.metric) - getMetricValue(a, state.metric));
  const sliced = state.topN > 0 ? data.slice(0, state.topN) : data;
  const vals = sliced.map(d => getMetricValue(d, state.metric));
  const colors = ["#1565C0","#2E7D32","#E65100","#6A1B9A","#00838F"];
  const ci = ["daily_ridership_wan","operating_mileage_km","operating_stations","ridership_intensity"]
    .indexOf(state.metric);

  getChart("chartRank").setOption({
    tooltip: { trigger: "axis", axisPointer: { type: "shadow" },
      formatter: p => `${p.name}<br/>${ml.name}: ${p.value != null ? p.value.toFixed(ml.decimals) : "--"} ${ml.unit}` },
    grid: { left: "3%", right: "8%", bottom: "3%", top: "3%", containLabel: true },
    xAxis: { type: "value", axisLabel: { color: "#aaa" }, splitLine: { lineStyle: { color: "#1a3a5a" } } },
    yAxis: { type: "category", data: sliced.map(d => d.city_cn).reverse(), axisLabel: { color: "#ccc" } },
    series: [{ type: "bar", data: vals.reverse(),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0,[
        {offset:0,color:colors[ci]||"#1565C0"},{offset:1,color:"#42A5F5"}]) },
      label: { show: true, position: "right", color: "#ccc", fontSize: 11,
               formatter: p => p.value != null ? p.value.toFixed(ml.decimals) : "--" }
    }],
  }, true);
}

  const data = getFilteredData().sort((a, b) => b.operating_mileage_km - a.operating_mileage_km);

  getChart("chartMileage").setOption({

    series: [{ type: "bar", data: sliced.map(d => d.operating_mileage_km).reverse(),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0,[
        {offset:0,color:"#2E7D32"},{offset:1,color:"#66BB6A"}]) },

  }, true);

function updateTrendChart() {
  const ranked = getFilteredData()
    .filter(hasValidDailyRidership)
    .sort((a, b) => b.daily_ridership_wan - a.daily_ridership_wan);
  const top8 = ranked.slice(0, 8);
  document.getElementById("trendTitle").textContent = `Top ${Math.min(8, top8.length)} 城市年度客流趋势`;

  // 合并所有年份并去重排序
  const yearSet = new Set();
  top8.forEach(d => d.yearly_avg_ridership.years.forEach(y => yearSet.add(y)));
  const allYears = [...yearSet].sort((a, b) => a - b);

  // 每个城市按 allYears 对齐数据，缺失年份填 null
  const seriesData = top8.map(d => {
    const map = {};
    d.yearly_avg_ridership.years.forEach((y, i) => { map[y] = d.yearly_avg_ridership.values[i]; });
    return allYears.map(y => (y in map) ? map[y] : null);
  });

  getChart("chartTrend").setOption({
    tooltip: { trigger: "axis" },
    legend: { data: top8.map(d => d.city_cn), textStyle: { color: "#ccc", fontSize: 11 }, top: 0, type: "scroll" },
    grid: { left: "3%", right: "4%", bottom: "3%", top: "40", containLabel: true },
    xAxis: { type: "category", data: allYears, axisLabel: { color: "#aaa" }, splitLine: { lineStyle: { color: "#1a3a5a" } } },
    yAxis: { type: "value", axisLabel: { color: "#aaa" }, splitLine: { lineStyle: { color: "#1a3a5a" } } },
    series: top8.map((d, i) => ({
      name: d.city_cn, type: "line", smooth: true,
      data: seriesData[i],
      connectNulls: false,
      lineStyle: { width: 2 }, symbolSize: 4,
      itemStyle: { color: colorPalette[i % colorPalette.length] }
    }))
  }, true);
}

// === 客流强度 ===
function updateIntensityChart() {
  const data = getFilteredData()
    .filter(d => d.ridership_intensity > 0)
    .sort((a, b) => b.ridership_intensity - a.ridership_intensity);
  const sliced = state.topN > 0 ? data.slice(0, state.topN) : data;
  getChart("chartIntensity").setOption({
    tooltip: { trigger: "axis", axisPointer: { type: "shadow" },
               formatter: p => `${p.name}<br/>客流强度: ${p.value.toFixed(3)}` },
    grid: { left: "3%", right: "8%", bottom: "3%", top: "3%", containLabel: true },
    xAxis: { type: "value", axisLabel: { color: "#aaa" }, splitLine: { lineStyle: { color: "#1a3a5a" } } },
    yAxis: { type: "category", data: sliced.map(d => d.city_cn).reverse(), axisLabel: { color: "#ccc" } },
    series: [{ type: "bar", data: sliced.map(d => d.ridership_intensity).reverse(),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0,[
        {offset:0,color:"#E65100"},{offset:1,color:"#FFB74D"}]) },
      label: { show: true, position: "right", color: "#ccc", fontSize: 11, formatter: p => p.value.toFixed(2) }
    }]
  }, true);
}

// === 地图散点 ===
let mapReady = false;
let mapChart = null;
let mapFallbackMode = false;

function buildMapData() {
  const metric = state.metric;
  const ml = METRIC_LABELS[metric];
  const data = getFilteredData().filter(d => CITY_COORDS[d.city] && isMetricValid(d, metric));

  const bubble = data.map(d => {
    const v = getMetricValue(d, metric);
    return { name: d.city_cn, value: [...CITY_COORDS[d.city], v], city: d.city, rawData: d };
  });

  const sorted = [...data].sort((a, b) => getMetricValue(b, metric) - getMetricValue(a, metric));
  const top = sorted.slice(0, 10);
  const ripple = top.map(d => {
    const v = getMetricValue(d, metric);
    return { name: d.city_cn, value: [...CITY_COORDS[d.city], v], city: d.city, rawData: d };
  });

  document.getElementById("mapTitle").textContent = `全国城市散点地图 — ${ml.name}`;
  return { bubble, ripple };
}

function getMapOption(mapData) {
  const metric = state.metric;
  const ml = METRIC_LABELS[metric];
  const maxVal = Math.max(...mapData.bubble.map(d => d.value[2]), 1);

  return {
    tooltip: {
      trigger: "item",
      formatter: p => {
        if (p.seriesType === "effectScatter" || p.seriesType === "scatter") {
          const d = p.data.rawData;
          return `<b style="font-size:14px">${d.city_cn}</b><br/>` +
            `${ml.name}: <b>${formatMetricValue(d, metric)}</b><br/>` +
            `运营里程: ${d.operating_mileage_km} km<br/>` +
            `站点数: ${d.operating_stations} 座<br/>` +
            `客流强度: ${d.ridership_intensity.toFixed(2)}`;
        }
        return p.name;
      }
    },
    geo: {
      map: "china", roam: true, zoom: 1.2, center: [105, 36],
      label: { show: false },
      itemStyle: { areaColor: "#0d2550", borderColor: "#1e5a8a", borderWidth: 0.8 },
      emphasis: { itemStyle: { areaColor: "#1a3a6a" }, label: { show: false } }
    },
    series: [
      {
        name: ml.name, type: "scatter", coordinateSystem: "geo",
        data: mapData.bubble,
        symbolSize: val => Math.max(6, Math.sqrt(val[2] / maxVal * 900)),
        itemStyle: {
          color: p => {
            const ratio = p.value[2] / maxVal;
            if (ratio > 0.7) return "#ff5252";
            if (ratio > 0.4) return "#ff9800";
            if (ratio > 0.2) return "#ffd740";
            if (ratio > 0.1) return "#69f0ae";
            return "#40c4ff";
          },
          shadowBlur: 8, shadowColor: "rgba(33,150,243,0.4)"
        },
        label: { show: true, formatter: "{b}", position: "right", fontSize: 10, color: "#b0c4de" }
      },
      {
        name: "Top 涟漪", type: "effectScatter", coordinateSystem: "geo",
        data: mapData.ripple,
        symbolSize: val => Math.max(10, Math.sqrt(val[2] / maxVal * 900)),
        rippleEffect: { brushType: "stroke", scale: 4, period: 4 },
        itemStyle: {
          color: p => {
            const ratio = p.value[2] / maxVal;
            if (ratio > 0.8) return "#ff1744";
            if (ratio > 0.5) return "#ff9100";
            return "#ffea00";
          }
        },
        label: { show: false }
      }
    ]
  };
}

function updateMapChart() {
  if (mapFallbackMode) { showMapFallback(); return; }
  if (!mapReady || !mapChart) return;
  mapChart.setOption(getMapOption(buildMapData()), true);
}

// === Phase 3: 地图 GeoJSON 加载（本地优先 + 远程 fallback + 降级列表）===
function showMapFallback() {
  mapFallbackMode = true;
  const metric = state.metric;
  const ml = METRIC_LABELS[metric];
  const data = getFilteredData()
    .filter(d => isMetricValid(d, metric))
    .sort((a, b) => {
      const va = getMetricValue(a, metric), vb = getMetricValue(b, metric);
      return (vb || 0) - (va || 0);
    });
  const el = document.getElementById("chartMap");
  el.innerHTML =
    '<div style="color:#90caf9;text-align:center;padding:12px 0;font-size:13px">' +
    '地图数据加载失败，排行榜和城市详情仍可正常使用</div>' +
    '<div class="fallback-list"><table><tr>' +
    '<th>城市</th><th>' + ml.name + '(' + ml.unit + ')</th><th>里程(km)</th><th>站点</th>' +
    '</tr>' +
    data.map(d => '<tr>' +
      '<td>' + d.city_cn + '</td>' +
      '<td>' + formatMetricValue(d, metric) + '</td>' +
      '<td>' + d.operating_mileage_km + '</td>' +
      '<td>' + d.operating_stations + '</td>' +
      '</tr>').join("") +
    '</table></div>';
}

function loadGeoJSON() {
  // 优先本地
  fetch("assets/china.json")
    .then(r => { if (!r.ok) throw new Error("local miss"); return r.json(); })
    .then(registerAndRender)
    .catch(() => {
      // 远程 fallback
      fetch("https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json")
        .then(r => { if (!r.ok) throw new Error("remote miss"); return r.json(); })
        .then(registerAndRender)
        .catch(() => {
          mapFallbackMode = true;
          showMapFallback();
        });
    });
}

function registerAndRender(geoJson) {
  echarts.registerMap("china", geoJson);
  mapChart = getChart("chartMap");
  mapReady = true;
  mapChart.setOption(getMapOption(buildMapData()));
  // 点击联动详情
  mapChart.on("click", function(params) {
    if (!params.data || !params.data.rawData) return;
    showCityDetail(params.data.rawData);
  });
}

// === 城市详情面板 ===
function showCityDetail(d) {
  const yearly = d.yearly_avg_ridership;
  const trendHTML = yearly.years.length > 0
    ? `<div style="margin-top:12px"><div class="metric"><span class="k">年度趋势</span></div>` +
      yearly.years.map((y, i) =>
        `<div class="metric"><span class="k">${y}</span><span class="v">${yearly.values[i].toFixed(1)} 万</span></div>`
      ).join("") + "</div>"
    : "";

  document.getElementById("detailContent").innerHTML =
    `<div class="city-title">${d.city_cn}</div>` +
    `<div class="metric"><span class="k">日客流量</span><span class="v">${fmtDaily(d)}</span></div>` +
    `<div class="metric"><span class="k">历史最高</span><span class="v">${d.peak_ridership_wan} 万 (${d.peak_ridership_date})</span></div>` +
    `<div class="metric"><span class="k">客流强度</span><span class="v">${d.ridership_intensity.toFixed(2)}</span></div>` +
    `<div class="metric"><span class="k">运营线路</span><span class="v">${d.operating_lines} 条</span></div>` +
    `<div class="metric"><span class="k">运营站点</span><span class="v">${d.operating_stations} 座</span></div>` +
    `<div class="metric"><span class="k">运营里程</span><span class="v">${d.operating_mileage_km} km</span></div>` +
    `<div class="metric"><span class="k">在建线路</span><span class="v">${d.lines_under_construction} 条</span></div>` +
    trendHTML;
}

// === 统一刷新入口 ===
function updateDashboard() {
  updateCards();
  updateRankChart();
  updateMileageChart();
  updateTrendChart();
  updateIntensityChart();
  updateMapChart();
}

// === 事件绑定 ===
document.getElementById("citySearch").addEventListener("input", function() {
  state.keyword = this.value.trim();
  updateDashboard();
});
document.getElementById("metricSelect").addEventListener("change", function() {
  state.metric = this.value;
  updateDashboard();
});
document.getElementById("topNSelect").addEventListener("change", function() {
  state.topN = parseInt(this.value);
  updateDashboard();
});

// === 响应式 ===
window.addEventListener("resize", () => {
  document.querySelectorAll(".chart, .map-chart").forEach(el => {
    const inst = echarts.getInstanceByDom(el);
    if (inst) inst.resize();
  });
});

// === 启动 ===
updateDashboard();
loadGeoJSON();
</script>
</body>
</html>
