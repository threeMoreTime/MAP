name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  legacy-check:
    name: Legacy Dashboard Baseline Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install Root Dependencies
      run: npm ci

    - name: Run Legacy Data Validation
      run: npm run test:data

    - name: Run Legacy Browser Acceptance Tests
      run: npm run test:acceptance

  react-check:
    name: React Frontend Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Run React Typecheck
      working-directory: frontend
      run: npm run typecheck

    - name: Build React Application
      working-directory: frontend
      run: npm run build

    - name: Run Static Build Check
      working-directory: frontend
      run: npm run check:static

  react-ui-test:
    name: React Frontend UI Test
    needs: react-check
    runs-on: ubuntu-latest

    env:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Print Chrome Version
      run: google-chrome --version

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Build React Application
      working-directory: frontend
      run: npm run build

    - name: Run React UI Acceptance Tests
      working-directory: frontend
      run: npm run test:ui
